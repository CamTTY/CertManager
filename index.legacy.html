<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Optimus CertManager — POC</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1E1D1E; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
// ============================================================
// POC NOTICE: This is a proof-of-concept build.
// All API calls are mocked with simulated latency.
// To promote to production:
//   1. Replace every function marked "TODO (production)" with
//      a real fetch() call to the documented endpoint.
//   2. Remove Babel standalone and add a proper build step (Vite, etc.).
//   3. Store secrets in environment variables or a secrets manager.
//   4. Add proper error boundaries, retry logic, and auth flows.
// ============================================================

const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────────────────────
// STYLES
// ─────────────────────────────────────────────────────────────
const STYLES = `
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --primary:        #1B39D8;
  --secondary:      #7B35DD;
  --tertiary:       #D030E2;
  --black:          #1E1D1E;
  --white:          #FFFFFF;
  --gradient:       linear-gradient(135deg, #1B39D8 0%, #7B35DD 50%, #D030E2 100%);
  --bg-surface:     #252428;
  --bg-panel:       #2A2930;
  --bg-input:       #1E1D22;
  --border:         #3A383E;
  --border-focus:   #7B35DD;
  --text-primary:   #F2F1F4;
  --text-muted:     #8A8892;
  --text-dim:       #5C5A64;
  --status-critical:#FF3B3B;
  --status-warning: #F5A623;
  --status-healthy: #2ECC71;
  --status-expired: #CC3333;
  --log-info:       #B0AEB6;
  --log-success:    #2ECC71;
  --log-warning:    #F5A623;
  --log-error:      #FF3B3B;
  --log-api:        #00D4FF;
}

/* ── Theme: Light Mode ───────────────────────────────── */
:root[data-theme="light"] {
  --bg-surface:     #F4F3F6;
  --bg-panel:       #FFFFFF;
  --bg-input:       #FFFFFF;
  --border:         #C9C7CE;
  --border-focus:   #7B35DD;
  --text-primary:   #15141A;
  --text-muted:     #3F3E45;
  --text-dim:       #6B6970;
  --log-info:       #3F3E45;
  --log-api:        #1450C2;
  --log-success:    #1F8A4A;
  --log-warning:    #B07308;
  --log-error:      #C7281D;
  /* Status colors match dark/meg mode (vibrant). Visibility on white is
     achieved via denser badge fills + stronger borders below, not by darkening. */
}
:root[data-theme="light"] .badge-critical {
  background: rgba(255,59,59,0.22);
  border-color: rgba(255,59,59,0.7);
  font-weight: 700;
}
:root[data-theme="light"] .badge-warning {
  background: rgba(245,166,35,0.28);
  border-color: rgba(245,166,35,0.75);
  font-weight: 700;
}
:root[data-theme="light"] .badge-healthy {
  background: rgba(46,204,113,0.22);
  border-color: rgba(46,204,113,0.7);
  font-weight: 700;
}
:root[data-theme="light"] .badge-expired {
  background: rgba(204,51,51,0.28);
  border-color: rgba(204,51,51,0.75);
  font-weight: 700;
}
:root[data-theme="light"] body { background: #ECEAEF; color: var(--text-primary); }

/* Light mode — squircle mark keeps the brand gradient; wordmark flips
   from its default white fill to black so it stays readable on the light bg. */
:root[data-theme="light"] .app-logo path[fill="white"] { fill: #000 !important; }

/* Tag pills — darker, higher-contrast in light mode */
:root[data-theme="light"] .sans-tag {
  background: rgba(123, 53, 221, 0.14);
  border-color: rgba(123, 53, 221, 0.4);
  color: #4A1B8C;
  font-weight: 600;
  box-shadow: inset 1px 0 0 rgba(123,53,221,0.45);
}

/* ── Theme: Meg Mode (pink-tinted dark) ──────────────── */
:root[data-theme="meg"] {
  --primary:        #FF3DA5;
  --secondary:      #FF6FB7;
  --tertiary:       #FFA1CE;
  --gradient:       linear-gradient(135deg, #FF3DA5 0%, #FF6FB7 50%, #FFA1CE 100%);
  --bg-surface:     #2A1E26;
  --bg-panel:       #33252E;
  --bg-input:       #1F141A;
  --border:         #4A2F40;
  --border-focus:   #FF3DA5;
  --text-primary:   #FFEAF3;
  --text-muted:     #C49EB3;
  --text-dim:       #8A6377;
  --log-info:       #E0BCD0;
  --log-api:        #FF6FB7;
}
:root[data-theme="meg"] body { background: #1F141A; color: var(--text-primary); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--black);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.app-container {
  min-height: 100vh;
  padding-bottom: 44px;
}

.main-content {
  padding: 16px 20px;
}

/* ── Header ─────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
}

.header-left { display: flex; align-items: center; gap: 12px; }
.header-right { display: flex; align-items: center; gap: 10px; }

.header-tagline {
  font-size: 15px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.2px;
  color: var(--text-primary);
  padding-left: 14px;
  border-left: 2px solid var(--secondary);
}

/* ── POC Banner ──────────────────────────────────────── */
.poc-banner {
  background: #2D2200;
  border-bottom: 2px solid var(--status-warning);
  padding: 6px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--status-warning);
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.poc-banner-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--status-warning);
  flex-shrink: 0;
  animation: pulse-warning 2s ease-in-out infinite;
}

@keyframes pulse-warning {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

/* ── Settings Drawer ─────────────────────────────────── */
.settings-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(2px);
  z-index: 700;
  animation: fade-in 0.18s ease;
}

.settings-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 400px;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  z-index: 800;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  box-shadow: -12px 0 48px rgba(0,0,0,0.5);
}
.settings-panel.open {
  transform: translateX(0);
}

.settings-drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.settings-drawer-title {
  font-size: 15px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  color: var(--white);
  letter-spacing: 0.2px;
}
.settings-drawer-close {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-muted);
  cursor: pointer;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; line-height: 1;
  transition: color 0.15s, border-color 0.15s;
}
.settings-drawer-close:hover { color: var(--text-primary); border-color: var(--text-muted); }

.settings-drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
}

.settings-drawer-footer {
  flex-shrink: 0;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-panel);
}

.settings-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

.settings-field { display: flex; flex-direction: column; gap: 4px; }

.settings-field label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  font-weight: 500;
}

.settings-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.settings-input-wrap input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 7px 10px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
  padding-right: 32px;
}

.settings-input-wrap input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 2px rgba(123,53,221,0.15);
}

.settings-input-wrap input::placeholder { color: var(--text-dim); font-size: 12px; }

.settings-field-full { grid-column: 1 / -1; }

.settings-textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 7px 10px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
  resize: vertical;
  min-height: 90px;
}
.settings-textarea:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 2px rgba(123,53,221,0.15);
}
.settings-textarea::placeholder { color: var(--text-dim); font-size: 12px; }

.themed-select {
  position: relative;
  width: 100%;
  font-family: 'DM Mono', monospace;
}
.themed-select-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 7px 10px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  text-align: left;
}
.themed-select-trigger:hover { border-color: var(--text-muted); }
.themed-select-trigger:focus,
.themed-select.open .themed-select-trigger {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 2px rgba(123,53,221,0.15);
}
.themed-select-caret {
  width: 10px; height: 10px; flex-shrink: 0;
  color: var(--text-muted);
  transition: transform 0.15s;
}
.themed-select.open .themed-select-caret { transform: rotate(180deg); color: var(--text-primary); }

.themed-select-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 4px;
  z-index: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  display: flex;
  flex-direction: column;
  gap: 2px;
  animation: themed-select-in 0.12s ease-out;
}
@keyframes themed-select-in {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.themed-select-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 4px;
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  transition: background 0.1s;
  user-select: none;
}
.themed-select-option:hover { background: rgba(123,53,221,0.12); }
:root[data-theme="meg"] .themed-select-option:hover { background: rgba(255,61,165,0.14); }
:root[data-theme="light"] .themed-select-option:hover { background: rgba(123,53,221,0.10); }
.themed-select-option.selected {
  background: var(--gradient);
  color: #fff;
}
.themed-select-option.selected:hover { background: var(--gradient); }
.themed-select-check {
  font-size: 11px;
  opacity: 0.9;
}

.settings-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  width: 100%;
}
.settings-dirty-indicator {
  margin-right: auto;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
}
.settings-dirty-indicator.visible {
  opacity: 1;
  color: var(--log-warning);
}

.eye-btn {
  position: absolute; right: 8px;
  background: none; border: none;
  cursor: pointer; color: var(--text-muted);
  display: flex; align-items: center;
  padding: 2px; transition: color 0.15s;
}
.eye-btn:hover { color: var(--text-primary); }

/* ── Buttons ─────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  border: none; border-radius: 5px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  transition: opacity 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn:active:not(:disabled) { transform: scale(0.97); }
.btn:disabled { opacity: 0.38; cursor: not-allowed; }

.btn-primary { background: var(--gradient); color: #fff; padding: 7px 14px; font-size: 13px; }
.btn-primary:hover:not(:disabled) { opacity: 0.88; }

.btn-secondary {
  background: transparent; color: var(--text-primary);
  border: 1px solid var(--border); padding: 7px 14px; font-size: 13px;
}
.btn-secondary:hover:not(:disabled) { border-color: var(--text-muted); background: rgba(255,255,255,0.04); }

.btn-ghost {
  background: transparent; color: var(--text-muted);
  padding: 5px 10px; font-size: 12px; border: 1px solid transparent;
}
.btn-ghost:hover:not(:disabled) { color: var(--text-primary); border-color: var(--border); }

.btn-danger {
  background: rgba(255,59,59,0.12); color: var(--status-critical);
  border: 1px solid rgba(255,59,59,0.25); padding: 7px 14px; font-size: 13px;
}
.btn-danger:hover:not(:disabled) { background: rgba(255,59,59,0.2); }

.btn-sm  { padding: 4px 10px; font-size: 12px; }
.btn-xs  { padding: 3px 8px;  font-size: 11px; }

.settings-toggle-btn {
  background: transparent; border: 1px solid var(--border); border-radius: 5px;
  color: var(--text-muted); cursor: pointer; padding: 6px 12px;
  font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.15s, border-color 0.15s;
}
.settings-toggle-btn:hover,
.settings-toggle-btn.active { color: var(--text-primary); border-color: var(--text-muted); }

/* ── Dashboard ───────────────────────────────────────── */
.dashboard-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; gap: 12px;
}
.dashboard-title {
  font-size: 16px; font-weight: 700; color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}
.dashboard-meta { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
.dashboard-controls { display: flex; align-items: center; gap: 10px; }

/* ── Dashboard secondary toolbar row ────────────────── */
.dashboard-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  gap: 10px;
}
.dashboard-toolbar-meta {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.2px;
}
.dashboard-toolbar-controls { display: flex; align-items: center; gap: 8px; }

/* ── Refresh interval toggle group ───────────────────── */
.refresh-interval-group {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
}
.refresh-interval-btn {
  background: transparent;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px 10px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.refresh-interval-btn:last-child { border-right: none; }
.refresh-interval-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.refresh-interval-btn.active {
  background: var(--gradient);
  color: #fff;
}

/* ── Cert Table ──────────────────────────────────────── */
.table-wrap {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.cert-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.cert-th {
  background: var(--bg-panel); padding: 10px 12px; text-align: left;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted);
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.cert-th.sortable { cursor: pointer; user-select: none; }
.cert-th.sortable:hover { color: var(--text-primary); }
.cert-th.sort-active { color: var(--text-primary); }
.sort-indicator { display: inline-block; margin-left: 4px; font-size: 10px; opacity: 0.7; }

.cert-td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  vertical-align: middle; color: var(--text-primary);
}
.cert-row:last-child .cert-td { border-bottom: none; }
.cert-row:hover .cert-td { background: rgba(255,255,255,0.04) !important; }

/* ── Status-driven row accents ───────────────────────── */
.cert-row-critical > td:first-child { border-left: 3px solid var(--status-critical); padding-left: 9px; }
.cert-row-warning  > td:first-child { border-left: 3px solid var(--status-warning);  padding-left: 9px; }
.cert-row-expired  > td:first-child { border-left: 3px solid var(--status-expired);  padding-left: 9px; }
.cert-row-healthy  > td:first-child { border-left: 3px solid transparent; padding-left: 9px; }
.cert-row-critical .cert-td { background: rgba(255,59,59,0.018); }
.cert-row-expired  .cert-td { background: rgba(204,51,51,0.022); }

.cert-name { font-weight: 500; font-family: 'DM Mono', monospace; font-size: 12px; }
.cert-subject {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sans-list { display: flex; flex-wrap: wrap; gap: 3px; }
.sans-tag {
  background: rgba(123,53,221,0.2);
  color: #B088EE;
  border: 1px solid rgba(123,53,221,0.35);
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
  font-weight: 500;
  letter-spacing: 0.2px;
  box-shadow: inset 1px 0 0 rgba(123,53,221,0.4);
}
.cert-issuer {
  font-size: 11px; color: var(--text-muted);
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.expiry-date { font-family: 'DM Mono', monospace; font-size: 12px; white-space: nowrap; }
.days-remaining { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; }
.days-critical { color: var(--status-critical); }
.days-warning  { color: var(--status-warning); }
.days-healthy  { color: var(--status-healthy); }
.days-expired  { color: var(--status-expired); }

/* ── Status Badges ───────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 4px; font-size: 11px;
  font-weight: 600; letter-spacing: 0.3px; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.badge-critical {
  background: rgba(255,59,59,0.12); color: var(--status-critical);
  border: 1px solid rgba(255,59,59,0.3);
  animation: pulse-critical 1.5s ease-in-out infinite;
}
.badge-warning  { background: rgba(245,166,35,0.12); color: var(--status-warning);  border: 1px solid rgba(245,166,35,0.3); }
.badge-healthy  { background: rgba(46,204,113,0.1);  color: var(--status-healthy);  border: 1px solid rgba(46,204,113,0.25); }
.badge-expired  { background: rgba(139,0,0,0.2);     color: var(--status-expired);  border: 1px solid rgba(139,0,0,0.4); }
.badge-filter   { cursor: pointer; transition: opacity 0.15s, box-shadow 0.15s; user-select: none; }
.badge-filter:hover { opacity: 0.8; }
.badge-filter.filter-active  { box-shadow: 0 0 0 2px currentColor; }
.badge-filter.filter-inactive { opacity: 0.35; }

@keyframes pulse-critical {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,59,0.4); }
  50%       { box-shadow: 0 0 0 5px rgba(255,59,59,0); }
}

/* ── Action Buttons ──────────────────────────────────── */
.action-cell { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }

.tooltip-wrap { position: relative; display: inline-block; }
.tooltip-wrap .tooltip-text {
  visibility: hidden; opacity: 0;
  position: absolute; bottom: 130%; left: 50%;
  transform: translateX(-50%);
  background: #1A1920; color: var(--text-muted);
  padding: 5px 9px; border-radius: 5px; font-size: 11px;

// ─────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────
function uuid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function generatePassphrase() {
  const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  const bytes = crypto.getRandomValues(new Uint8Array(20));
  return Array.from(bytes).map(b => CHARS[b % CHARS.length]).join('');
}

// Display format for expiration dates. Storage stays ISO (YYYY-MM-DD) because
// it's used for new Date() comparisons in dedupe / sort logic; only the
// rendered string changes.
function formatExpirationDate(iso) {
  if (!iso) return '—';
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso);
  if (!m) return iso;
  const [, y, mo, d] = m;
  return `${mo}-${d}-${y}`;
}

function formatRelativeTime(date) {
  if (!date) return '—';
  const diff = Math.floor((Date.now() - date.getTime()) / 1000);
  if (diff < 10)   return 'just now';
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 120)  return '1 min ago';
  if (diff < 3600) return `${Math.floor(diff / 60)} mins ago`;
  return `${Math.floor(diff / 3600)}h ago`;
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    try {
      const el = document.createElement('textarea');
      el.value = text;
      el.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      return true;
    } catch { return false; }
  }
}

function downloadTextFile(content, filename) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// Maps one Venafi certificate search result → portal cert shape.
// Field names reflect Venafi TLS Protect Cloud v1 response schema.
// Verify against a real API response and adjust if needed.
function mapVenafiCert(raw) {
  const expirationDate = raw.validityEnd?.slice(0, 10) ?? '';
  const daysRemaining  = Math.floor((new Date(raw.validityEnd) - Date.now()) / 86_400_000);
  const status = daysRemaining < 0   ? 'Expired'
               : daysRemaining <= 7  ? 'Critical'
               : daysRemaining <= 30 ? 'Warning'
               : 'Healthy';
  return {
    id:            raw.id ?? raw.managedCertificateId ?? raw.fingerprint,
    name:          raw.subjectCN?.[0] ?? raw.subjectDN ?? '',
    subject:       raw.subjectDN ?? '',
    tags:          Array.isArray(raw.tags) ? raw.tags : [],
    issuer:        raw.issuerCN?.[0] ?? raw.issuerDN ?? '',
    expirationDate,
    daysRemaining,
    status,
    thumbprint:    raw.fingerprintSha256 ?? raw.fingerprint ?? '',
    // Subject components — used to seed the CSR when re-issuing this cert
    // so the new CSR matches whatever the Venafi CIT policy requires.
    subjectO:      raw.subjectO ?? '',
    subjectOU:     Array.isArray(raw.subjectOU) ? raw.subjectOU : [],
    subjectL:      raw.subjectL ?? '',
    subjectST:     raw.subjectST ?? '',
    subjectC:      raw.subjectC ?? '',
    sanDnsNames:   Array.isArray(raw.subjectAlternativeNameDns) ? raw.subjectAlternativeNameDns : [],
    renewedAt:     null,
    downloadedAt:  null,
    deployedAt:    null,
  };
}

// Venafi can return multiple ACTIVE certs for the same hostname (different issuers,
// different tags, overlapping validity windows). The dashboard collapses duplicates
// only when hostname + issuer + tag-set all match — different issuer or different
// tag means the cert serves a different purpose and gets its own row. Within a
// matching group, the cert with the latest expiry wins.
function dedupeByHostname(certs) {
  const byKey = new Map();
  for (const c of certs) {
    const host    = (c.name   || '').toLowerCase();
    if (!host) continue;
    const issuer  = (c.issuer || '').toLowerCase();
    const tagsKey = (Array.isArray(c.tags) ? c.tags : [])
      .map(t => String(t).toLowerCase())
      .sort()
      .join('|');
    const key = `${host}::${issuer}::${tagsKey}`;
    const prev = byKey.get(key);
    if (!prev || new Date(c.expirationDate) > new Date(prev.expirationDate)) {
      byKey.set(key, c);
    }
  }
  return Array.from(byKey.values());
}

// Active when vaultUrl + vaultToken are set in Settings.
// POST /outagedetection/v1/certificatesearch
async function realFetchCerts(settings) {
  const hostnames = (settings.dnsHostnames || '')
    .split('\n').map(s => s.trim()).filter(Boolean);

  const innerOperands = [
    { field: 'certificateStatus', operator: 'MATCH', value: 'ACTIVE' },
  ];
  if (hostnames.length) {
    innerOperands.push({ field: 'dNSName', operator: 'MATCH', values: hostnames });
  }

  const res = await fetch(`${settings.vaultUrl}/outagedetection/v1/certificatesearch`, {
    method: 'POST',
    headers: {
      'accept':       'application/json',
      'content-type': 'application/json',
      'tppl-api-key': settings.vaultToken,
    },
    body: JSON.stringify({
      expression: { operands: [{ operands: innerOperands, operator: 'AND' }] },
    }),
  });
  if (!res.ok) throw new Error(`Venafi API ${res.status} ${res.statusText}`);
  const json = await res.json();
  return dedupeByHostname((json.certificates ?? []).map(mapVenafiCert));
}

// Local Python bridge that wraps CertDownload.py's keystore flow. Run with
//   python cert_service.py
// from the repo root. The portal POSTs to it whenever live credentials are set.
const CERT_SERVICE_URL = 'http://127.0.0.1:8765';

// Real keystore download — POSTs to cert_service which calls
// CertDownload.download_existing(cert_id, ...) and streams back a ZIP blob.
async function realExportCert(cert, exportFormat, settings, passphrase) {
  return certServiceFetch('/api/download/existing', {
    certificateId: cert.id,
    passphrase,
    exportFormat,
    apiKey:   settings.vaultToken || undefined,
    vaultUrl: settings.vaultUrl   || undefined,
  });
}

// Real mint + download — POSTs to cert_service which calls
// CertDownload.mint_and_download(cert_type, cn, ...) and streams back the
// freshly-issued cert's keystore as a ZIP blob.
async function realMintAndDownload(cert, exportFormat, settings, passphrase) {
  // Build CSR attrs from the existing cert so the new CSR satisfies the
  // CIT's distinguished-name policy (Venafi rejects mismatched O/L/ST/C).
  const csrAttrs = {
    commonName:   cert.name,
    organization: cert.subjectO  || undefined,
    organizationalUnits: (cert.subjectOU && cert.subjectOU.length) ? cert.subjectOU : undefined,
    locality:     cert.subjectL  || undefined,
    state:        cert.subjectST || undefined,
    country:      cert.subjectC  || undefined,
    subjectAlternativeNamesByType: {
      dnsNames: (cert.sanDnsNames && cert.sanDnsNames.length) ? cert.sanDnsNames : [cert.name],
    },
  };
  return certServiceFetch('/api/download/mint', {
    certType:    inferCertType(cert),
    commonName:  cert.name,
    csrAttrs,
    passphrase,
    exportFormat,
    // Carry the source cert's tags onto the renewed cert so the Venafi UI
    // shows the same product grouping.
    tags:        Array.isArray(cert.tags) && cert.tags.length ? cert.tags : undefined,
    apiKey:   settings.vaultToken || undefined,
    vaultUrl: settings.vaultUrl   || undefined,
  });
}

// Issue a brand-new cert via the same /api/download/mint endpoint used by
// renewal — Venafi's CKG flow doesn't distinguish "renew" from "new". Caller
// supplies the form values; this helper handles the body shape, including the
// hardcoded JH subject defaults and the RSA keyTypeParameters.
async function realCreateCert(form, settings, passphrase) {
  const algoMeta = KEY_ALGORITHMS.find(k => k.value === form.keyAlgo) || KEY_ALGORITHMS[0];
  const cn       = form.commonName.trim();
  const sans     = (form.sanDnsNames && form.sanDnsNames.length) ? form.sanDnsNames : [cn];

  const csrAttrs = {
    commonName:   cn,
    ...NEW_CERT_CSR_DEFAULTS,
    keyTypeParameters: {
      keyType:   algoMeta.algo,
      keyLength: algoMeta.size,
    },
    subjectAlternativeNamesByType: { dnsNames: sans },
  };

  return certServiceFetch('/api/download/mint', {
    certType:    form.certType,
    commonName:  cn,
    csrAttrs,
    passphrase,
    exportFormat: form.exportFormat || 'PEM',
    tags:         (form.tags && form.tags.length) ? form.tags : undefined,
    validity:     form.validity || undefined,
    apiKey:   settings.vaultToken || undefined,
    vaultUrl: settings.vaultUrl   || undefined,
  });
}

// Retire the old cert in Venafi after a successful renewal so it drops out of
// the dashboard's ACTIVE search and (with addToBlocklist) can't be re-issued.
async function realRetireCert(certId, settings) {
  const res = await fetch(`${CERT_SERVICE_URL}/api/cert/retire`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({
      certificateIds: [certId],
      addToBlocklist: true,
      apiKey:   settings.vaultToken || undefined,
      vaultUrl: settings.vaultUrl   || undefined,
    }),
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok || !json.ok) {
    throw new Error(json.error || `cert_service ${res.status}`);
  }
  return json;
}

// CIT selection: digicert | internal. Inferred from the existing cert's issuer.
function inferCertType(cert) {
  const issuer = (cert.issuer || '').toLowerCase();
  return issuer.includes('digicert') ? 'digicert' : 'internal';
}

// Tag-based PKCS12 extension override — these product groups consume the
// keystore as a .pfx (Windows tooling expectation) even though the bytes are
// identical to a .p12.
const PFX_EXTENSION_TAGS = new Set([
  'synergy',
  'opcon test',
  'synapsys',
  'optimus intranet',
  'synergy esign',
]);

function pkcs12ExtensionForTags(tags) {
  const wantsPfx = (Array.isArray(tags) ? tags : []).some(t => PFX_EXTENSION_TAGS.has(String(t).toLowerCase()));
  return wantsPfx ? 'pfx' : 'p12';
}

function pkcs12ExtensionForCert(cert) {
  return pkcs12ExtensionForTags(cert.tags);
}

// User-defined per-tag preference (set in the New Cert modal). First matching
// tag wins. Returns 'pem' | 'p12' | 'pfx' or null if no tag has a preference.
function tagFormatPreference(tags, prefs) {
  if (!prefs || !tags) return null;
  for (const t of tags) {
    const v = prefs[String(t).toLowerCase()];
    if (v) return v;
  }
  return null;
}

// Map a preference value → Venafi exportFormat ('PEM' | 'PKCS12' downstream).
// 'p12' and 'pfx' are both PKCS12 — the difference is just the saved extension.
function exportFormatFromPref(pref) {
  if (pref === 'pem') return 'PEM';
  if (pref === 'p12' || pref === 'pfx') return 'PFX';
  return null;
}

async function certServiceFetch(path, body) {
  const res = await fetch(`${CERT_SERVICE_URL}${path}`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    let msg;
    try {
      const data = await res.json();
      msg = data.error || res.statusText;
    } catch {
      msg = await res.text().catch(() => res.statusText);
    }
    throw new Error(`cert_service ${res.status}: ${msg}`);
  }
  return res.blob();
}

  useEffect(() => {
    if (collapsed) return;
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [logEntries.length, collapsed]);

  function handleCopyLog() {
    const text = logEntries.map(e => `${new Date(e.timestamp).toISOString()} [${e.level}] ${e.message}`).join('\n');
    copyToClipboard(text);
  }

  function handleExportLog() {
    const text = logEntries.map(e => `${new Date(e.timestamp).toISOString()} [${e.level}] ${e.message}`).join('\n');
    downloadTextFile(text, `certmanager-log-${Date.now()}.txt`);
  }

  const lastEntry = logEntries[logEntries.length - 1] || null;

  return (
    <div className={`log-panel ${expanded ? 'expanded' : ''} ${collapsed ? 'collapsed' : ''}`}>
      {collapsed ? (
        <div className="log-status-bar" onClick={() => setLogState('normal')} title="Click to expand activity log">
          <span className="log-status-label">
            <span className={`log-status-dot${lastEntry ? ` dot-${lastEntry.level}` : ''}`} />
            ACTIVITY
          </span>
          {lastEntry ? (
            <span className={`log-status-msg msg-${lastEntry.level}`}>
              {lastEntry.message}
            </span>
          ) : (
            <span className="log-status-msg">No entries yet</span>
          )}
          <div className="log-status-right" onClick={e => e.stopPropagation()}>
            <span className="log-count-pill">{logEntries.length}</span>
            <button className="log-expand-chevron" onClick={() => setLogState('normal')} title="Expand log">▴</button>
          </div>
        </div>
      ) : (
        <div className="log-header">
          <div className="log-header-left">
            <span className="log-title">Activity Log</span>
            <span className="log-badge">{logEntries.length}</span>
          </div>
          <div className="log-header-right">
            <button className="btn btn-ghost btn-xs" onClick={handleCopyLog}>Copy Log</button>
            <button className="btn btn-ghost btn-xs" onClick={handleExportLog}>Export</button>
            {confirmClear ? (
              <>
                <span style={{fontSize:11,color:'var(--text-muted)'}}>Confirm clear?</span>
                <button className="btn btn-danger btn-xs" onClick={() => { onClear(); setConfirmClear(false); }}>Yes</button>
                <button className="btn btn-ghost btn-xs" onClick={() => setConfirmClear(false)}>No</button>
              </>
            ) : (
              <button className="btn btn-ghost btn-xs" onClick={() => setConfirmClear(true)}>Clear</button>
            )}
            <button className="btn btn-ghost btn-xs" onClick={() => setLogState(expanded ? 'normal' : 'expanded')}>
              {expanded ? '⊟ Collapse' : '⊞ Expand'}
            </button>
            <button
              className="btn btn-ghost btn-xs"
              onClick={() => setLogState('collapsed')}
              title="Minimize to status bar"
            >
              ▾ Minimize
            </button>
          </div>
        </div>
      )}
      {!collapsed && (
        <div className="log-entries">
          {logEntries.length === 0 && (
            <div style={{color:'var(--text-dim)',fontStyle:'italic',padding:'8px 0',fontSize:11}}>
              No log entries yet. Actions will appear here.
            </div>
          )}
          {logEntries.map(entry => <LogEntry key={entry.id} entry={entry} />)}
          <div ref={bottomRef} />
        </div>
      )}
    </div>
  );
}

function CertManageModal({ cert, passphrase, settings, addLog, onUpdateCert, onClose, onRequestRefresh }) {
  if (!cert) return null;

  // All actions are explicit opt-in — nothing is pre-selected on open.
  const [includeRenew,    setIncludeRenew]    = useState(false);
  const [includeDownload, setIncludeDownload] = useState(false);
  // Default export format: tag preference wins (set via the New Cert modal),
  // then DigiCert→PEM heuristic, then PFX for everything else.
  const [exportFormat,    setExportFormat]    = useState(() => {
    const fromPref = exportFormatFromPref(
      tagFormatPreference(cert.tags, settings.tagFormatPreferences)
    );
    return fromPref || (inferCertType(cert) === 'digicert' ? 'PEM' : 'PFX');
  });
  const [running,  setRunning]  = useState(false);
  const [finished, setFinished] = useState(false);
  const [steps,    setSteps]    = useState([]);
  // Editable copy of the auto-generated passphrase. Reseeds when the prop
  // changes (e.g. opening the modal on a different cert).
  const [passphraseDraft, setPassphraseDraft] = useState(passphrase);
  useEffect(() => { setPassphraseDraft(passphrase); }, [passphrase]);

  const isExpired  = cert.daysRemaining < 0;
  const isCritical = cert.daysRemaining <= 7 && cert.daysRemaining >= 0;
  const isPEM      = exportFormat === 'PEM';

  function markStep(id, patch) { setSteps(prev => prev.map(s => s.id === id ? { ...s, ...patch } : s)); }

  // Auto-check Download whenever Renew is turned on — renewing without
  // delivering the new keystore is rarely useful. The user can still uncheck
  // Download manually after the fact.
  useEffect(() => {
    if (includeRenew && !includeDownload) setIncludeDownload(true);
  }, [includeRenew]);

  async function handleStart() {
    const isLive = !!(settings.vaultUrl && settings.vaultToken);
    // When live + both renew and download are checked, the two operations collapse
    // into a single Venafi mint_and_download call (CKG mints a fresh cert and the
    // same call returns its keystore). The UI shows them as one combined step.
    const combinedMint = isLive && includeRenew && includeDownload;

    const plan = [
      ...(combinedMint
        ? [{ id:'renew-download', label:`Renew + download (${exportFormat})`, status:'running', message:'' }]
        : [
            ...(includeRenew    ? [{ id:'renew',    label:'Renew Certificate',                          status:'running', message:'' }] : []),
            ...(includeDownload ? [{ id:'download', label:`Download ${exportFormat} bundle`,            status:'pending', message:'' }] : []),
          ]
      ),
    ];
    setSteps(plan);
    setRunning(true);

    // ── Combined: Renew + Download (live mint_and_download flow) ──
    if (combinedMint) {
      const t0 = Date.now();
      addLog('INFO', `[${cert.name}] Mint + download via Venafi CKG (cert_type=${inferCertType(cert)})…`);
      try {
        const blob = await realMintAndDownload(cert, exportFormat, settings, passphraseDraft);
        addLog('API',     `POST ${CERT_SERVICE_URL}/api/download/mint → 200 OK (${Date.now()-t0}ms)`);
        addLog('SUCCESS', `[${cert.name}] New certificate minted. Passphrase: [REDACTED]`);
        const certPref = tagFormatPreference(cert.tags, settings.tagFormatPreferences);
        const mintExt = certPref || (isPEM ? 'pem' : pkcs12ExtensionForCert(cert));
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href=url; a.download=`${cert.name}.${mintExt}`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        addLog('SUCCESS', `[${cert.name}] Downloaded — ${cert.name}.${mintExt}`);
        const d = new Date(); d.setFullYear(d.getFullYear()+1);
        onUpdateCert(cert.id, {
          renewedAt:Date.now(), downloadedAt:Date.now(),
          status:'Healthy', daysRemaining:365, expirationDate:d.toISOString().slice(0,10),
        });
        markStep('renew-download', { status:'done', message:`${cert.name}.${mintExt} saved — renewed 365d` });

        // Retire the old cert so it drops out of the dashboard's ACTIVE search.
        // Best-effort — a retire failure does NOT roll back the renewal.
        try {
          addLog('INFO', `[${cert.name}] Retiring old certificate ${cert.id}…`);
          const tR = Date.now();
          await realRetireCert(cert.id, settings);
          addLog('API',     `POST ${CERT_SERVICE_URL}/api/cert/retire → 200 OK (${Date.now()-tR}ms) — ${cert.id}`);
          addLog('SUCCESS', `[${cert.name}] Old certificate retired`);
        } catch (err) {
          addLog('WARNING', `[${cert.name}] Old certificate retirement failed: ${err.message} (renewed cert is still valid; retire manually in Venafi)`);
        }
        // Refresh the dashboard so the retired cert disappears and the new
        // cert appears (assuming it matches the configured DNS hostname filter).
        if (onRequestRefresh) onRequestRefresh();
      } catch (err) {
        addLog('ERROR', `[${cert.name}] Mint + download failed: ${err.message}`);
        markStep('renew-download', { status:'error', message:err.message });
        setRunning(false); return;
      }
    } else {
      // ── Renew (separate, mock-only path — live renew without download is intentionally
      //    not wired here; minting without delivering the keystore wastes the new cert) ──
      if (includeRenew) {
        addLog('INFO', `[${cert.name}] Initiating certificate renewal…`);
        const t0 = Date.now();
        try {
          await mockRenewCert(cert.id, passphraseDraft);
          addLog('API',     `POST /api/v1/certificates/${cert.id}/renew → 200 OK (${Date.now()-t0}ms)`);
          addLog('SUCCESS', `[${cert.name}] Certificate renewed. Passphrase: [REDACTED]`);
          const d = new Date(); d.setFullYear(d.getFullYear()+1);
          onUpdateCert(cert.id, { renewedAt:Date.now(), status:'Healthy', daysRemaining:365, expirationDate:d.toISOString().slice(0,10) });
          markStep('renew', { status:'done', message:'Renewed — 365 days remaining' });
        } catch (err) {
          addLog('ERROR', `[${cert.name}] Renewal failed: ${err.message}`);
          markStep('renew', { status:'error', message:err.message });
          setRunning(false); return;
        }
      }

      // ── Download (download_existing on live, mock blob otherwise) ──
      if (includeDownload) {
        markStep('download', { status:'running' });
        addLog('INFO', `[${cert.name}] Requesting ${exportFormat} export…`);
        const t1 = Date.now();
        try {
          const blob = isLive
            ? await realExportCert(cert, exportFormat, settings, passphraseDraft)
            : await mockExportCert(cert.id, exportFormat);
          addLog('API', isLive
            ? `POST ${CERT_SERVICE_URL}/api/download/existing → 200 OK (${Date.now()-t1}ms)`
            : `GET /api/v1/certificates/${cert.id}/export?format=${exportFormat} → 200 OK (${Date.now()-t1}ms)`
          );
          // Live path: PEM → assembled single .pem bundle (cert + chain + key);
          // PFX/PKCS12 → raw binary keystore. Extension priority: user tag
          // preference → built-in PFX override list → format default.
          // Mock path emits a single-file PEM/PFX for offline POC use.
          const certPref = tagFormatPreference(cert.tags, settings.tagFormatPreferences);
          const ext = certPref || (isPEM ? 'pem' : (isLive ? pkcs12ExtensionForCert(cert) : 'pfx'));
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href=url; a.download=`${cert.name}.${ext}`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
          addLog('SUCCESS', `[${cert.name}] Downloaded — ${cert.name}.${ext}`);
          onUpdateCert(cert.id, { downloadedAt:Date.now() });
          markStep('download', { status:'done', message:`${cert.name}.${ext} saved` });
        } catch (err) {
          addLog('ERROR', `[${cert.name}] Export failed: ${err.message}`);
          markStep('download', { status:'error', message:err.message });
          setRunning(false); return;
        }
      }
    }

    setRunning(false);
    setFinished(true);
  }

  function StepIcon({ status }) {
    if (status === 'running') return <span className="spinner" style={{display:'inline-block',width:13,height:13,borderWidth:2,borderTopColor:'var(--secondary)',margin:0}} />;
    if (status === 'done')    return <span style={{color:'var(--status-healthy)'}}>✓</span>;
    if (status === 'error')   return <span style={{color:'var(--status-expired)'}}>✗</span>;
    return <span style={{color:'var(--text-dim)'}}>○</span>;
  }

  return (
    <div className="modal-overlay" onClick={e => !running && e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{maxWidth:600}}>
        <div className="modal-title">Manage Certificate</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:12,marginBottom:14,alignItems:'start'}}>
          <div>
            <div className="modal-label">Certificate</div>
            <div className="modal-value">{cert.name}</div>
          </div>
          <div style={{display:'flex',gap:16,textAlign:'right'}}>
            <div>
              <div className="modal-label">Expiration</div>
              <div className="modal-value" style={{fontSize:12}}>{formatExpirationDate(cert.expirationDate)}</div>
            </div>
            <div>
              <div className="modal-label">Days</div>
              <div className={`modal-value days-${cert.status.toLowerCase()}`}>
                {cert.daysRemaining < 0 ? `${cert.daysRemaining}` : `+${cert.daysRemaining}`}
              </div>
            </div>
          </div>
        </div>

        {(isExpired || isCritical) && (
          <div className="expiry-warning" style={{marginBottom:14}}>
            <span>⚠</span>
            <span>{isExpired
              ? `Expired ${Math.abs(cert.daysRemaining)} days ago — no longer valid.`
              : `Expires in ${cert.daysRemaining} day${cert.daysRemaining!==1?'s':''} — renewal urgent.`}
            </span>
          </div>
        )}

        {!finished && (
          <>
            <hr className="modal-divider" />
            <div className="manage-section-label" style={{marginBottom:8}}>Auto-Generated Passphrase</div>
            <div className="manage-option-block" style={{marginBottom:10}}>
              <PassphraseField
                passphrase={passphraseDraft}
                onChange={setPassphraseDraft}
                disabled={running}
              />
            </div>

            <div className="manage-option-block" style={{marginBottom:10}}>
              <label className="checkbox-row">
                <input type="checkbox" checked={includeRenew} onChange={e => !running && setIncludeRenew(e.target.checked)} disabled={running} />
                <span className="checkbox-label" style={{fontWeight:600}}>Renew Certificate</span>
              </label>
              {includeRenew && includeDownload && (
                <div style={{fontSize:11,color:'var(--text-dim)',marginTop:6,fontFamily:'DM Mono,monospace'}}>
                  Renew + Download together mints a fresh certificate via Cloud Key Generation and returns its keystore.
                </div>
              )}
            </div>

            <div className="manage-option-block" style={{marginBottom:10}}>
              <label className="checkbox-row" style={{marginBottom: includeDownload ? 12 : 0}}>
                <input type="checkbox" checked={includeDownload} onChange={e => !running && setIncludeDownload(e.target.checked)} disabled={running} />
                <span className="checkbox-label" style={{fontWeight:600}}>Download Certificate</span>
              </label>
              {includeDownload && (
                <>
                  <div className="manage-section-label" style={{marginTop:8,marginBottom:6}}>Export Format</div>
                  <div style={{display:'flex',gap:8}}>
                    {['PFX','PEM'].map(fmt => (
                      <label key={fmt} style={{
                        display:'flex', alignItems:'center', gap:7, cursor:running?'not-allowed':'pointer',
                        flex:1, padding:'7px 12px',
                        background: exportFormat===fmt ? 'rgba(123,53,221,0.12)' : 'var(--bg-input)',
                        border: `1px solid ${exportFormat===fmt ? 'var(--secondary)' : 'var(--border)'}`,
                        borderRadius:5, transition:'all 0.15s',
                      }}>
                        <input type="radio" name="exportFormat" value={fmt} checked={exportFormat===fmt} onChange={() => !running && setExportFormat(fmt)} disabled={running} style={{accentColor:'var(--secondary)'}} />
                        <span style={{fontSize:13,fontFamily:'DM Mono,monospace',color:'var(--text-primary)'}}>
                          {fmt==='PFX' ? 'PFX / PKCS#12' : 'PEM / X.509'}
                        </span>
                      </label>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:'var(--text-dim)',marginTop:6,fontFamily:'DM Mono,monospace'}}>
                    {isPEM ? 'Exports certificate + encrypted private key as Base64 PEM blocks.' : 'Exports certificate + private key as a password-protected binary bundle.'}
                  </div>
                </>
              )}
            </div>

            {/* Deploy stage temporarily disabled — see ./deploy_future/ */}
          </>
        )}

        {steps.length > 0 && (
          <>
            <hr className="modal-divider" />
            <div className="manage-section-label">Progress</div>
            <div className="manage-step-list">
              {steps.map(s => (
                <div key={s.id} className="manage-step">
                  <div className="manage-step-icon"><StepIcon status={s.status} /></div>
                  <div>
                    <div className="manage-step-label">{s.label}</div>
                    {s.message && <div className="manage-step-msg">{s.message}</div>}
                  </div>
                </div>
              ))}
            </div>
          </>
        )}

        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose} disabled={running}>{finished ? 'Close' : 'Cancel'}</button>
          {!finished && (
            <button className="btn btn-primary" onClick={handleStart}
              disabled={running || (!includeRenew && !includeDownload)}>
              {running ? <><span className="spinner" /> Running…</> : '▶ Start'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function NewCertModal({ addLog, settings, existingTags, onCertIssued, onSetTagPreference, onClose }) {
  const [certType,      setCertType]      = useState('digicert');
  const [commonName,    setCommonName]    = useState('');
  const [validityDays,  setValidityDays]  = useState(365);
  const [keyAlgo,       setKeyAlgo]       = useState('RSA_2048');
  const [selectedTags,  setSelectedTags]  = useState([]);
  const [customTagInput, setCustomTagInput] = useState('');
  const [customTagFormat, setCustomTagFormat] = useState('p12');
  const [showAddTag,    setShowAddTag]    = useState(false);
  const [submitting,    setSubmitting]    = useState(false);
  const [done,          setDone]          = useState(false);
  const [newCertName,   setNewCertName]   = useState('');
  // Blob + filename held back from auto-download; user clicks Download on the
  // success screen if they want to save the keystore.
  const [issuedKeystore, setIssuedKeystore] = useState(null); // { blob, filename }
  const [issuedDownloaded, setIssuedDownloaded] = useState(false);
  // Passphrase shown to the user on the success screen so they can copy it
  // before closing — same UX as Manage → renewal.
  const [issuedPassphrase, setIssuedPassphrase] = useState('');

  const isLive = !!(settings.vaultUrl && settings.vaultToken);

  // Resolve export format: tag preference (if any selected tag has one) wins,
  // otherwise fall back to cert-type heuristic (DigiCert → PEM, Internal → PFX).
  const tagPref      = tagFormatPreference(selectedTags, settings.tagFormatPreferences);
  const tagPrefFmt   = exportFormatFromPref(tagPref);
  const exportFormat = tagPrefFmt || (certType === 'digicert' ? 'PEM' : 'PFX');

  // Combine known existing tags + any custom tags the user has added in this
  // session, deduped, sorted, case-insensitive.
  const tagOptions = React.useMemo(() => {
    const seen = new Map();
    const add = t => {
      const key = String(t).toLowerCase();
      if (key && !seen.has(key)) seen.set(key, t);
    };
    (existingTags || []).forEach(add);
    selectedTags.forEach(add);
    return Array.from(seen.values()).sort((a,b) => a.localeCompare(b));
  }, [existingTags, selectedTags]);

  function toggleTag(tag) {
    setSelectedTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);
  }

  function addCustomTag() {
    const t = customTagInput.trim();
    if (!t) return;
    if (!selectedTags.some(s => s.toLowerCase() === t.toLowerCase())) {
      setSelectedTags(prev => [...prev, t]);
    }
    if (onSetTagPreference) onSetTagPreference(t, customTagFormat);
    addLog('INFO', `Tag "${t}" preferred download format set to .${customTagFormat}.`);
    setCustomTagInput('');
    setCustomTagFormat('p12');
    setShowAddTag(false);
  }

  const validValidity = Number.isFinite(validityDays) && validityDays >= 1 && validityDays <= 365;
  const canSubmit = !!(certType && commonName.trim() && keyAlgo && validValidity && !submitting);

  async function handleSubmit() {
    if (!canSubmit) return;
    setSubmitting(true);

    const cn         = commonName.trim();
    const passphrase = generatePassphrase();
    const validity   = `P${validityDays}D`;
    const algoMeta   = KEY_ALGORITHMS.find(k => k.value === keyAlgo);

    addLog('INFO', `New cert request: CN=${cn}, type=${certType}, algo=${algoMeta.label}, validity=${validityDays}d`);

    if (!isLive) {
      addLog('ERROR', 'Live mode required — set Cloud Base URL + API Key in Settings.');
      setSubmitting(false);
      return;
    }

    const t0 = Date.now();
    try {
      const blob = await realCreateCert(
        { certType, commonName: cn, keyAlgo, validity, exportFormat, tags: selectedTags },
        settings,
        passphrase,
      );
      addLog('API',     `POST ${CERT_SERVICE_URL}/api/download/mint → 200 OK (${Date.now()-t0}ms)`);
      addLog('SUCCESS', `Certificate issued: CN=${cn}. Passphrase: [REDACTED]`);

      // Stash the keystore for an optional user-initiated download. Extension
      // priority: explicit tag preference → tag-based PFX override → format default.
      const isPEM = exportFormat === 'PEM';
      const ext   = tagPref || (isPEM ? 'pem' : pkcs12ExtensionForTags(selectedTags));
      setIssuedKeystore({ blob, filename: `${cn}.${ext}` });
      setIssuedPassphrase(passphrase);

      setNewCertName(cn);
      setDone(true);

      // Tell the App: append CN to dnsHostnames + refresh the dashboard so the
      // new cert appears.
      if (onCertIssued) onCertIssued(cn);
    } catch (err) {
      addLog('ERROR', `Certificate request failed: ${err.message}`);
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <div className="modal-overlay" onClick={e => !submitting && e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{maxWidth:600}}>
        <div className="modal-title">New Certificate Request</div>

        {done ? (
          <div className="ncr-success">
            <div className="ncr-success-icon">✓</div>
            <div className="ncr-success-title">Certificate Issued</div>
            <div className="ncr-success-id">CN={newCertName} has been added to the dashboard.</div>
            {issuedPassphrase && (
              <div style={{marginTop:18,textAlign:'left'}}>
                <div className="manage-section-label" style={{marginBottom:6}}>Auto-Generated Passphrase</div>
                <PassphraseField passphrase={issuedPassphrase} />
              </div>
            )}
            {issuedKeystore && (
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,marginTop:18}}>
                <button
                  type="button"
                  className="btn btn-primary"
                  onClick={() => {
                    const url = URL.createObjectURL(issuedKeystore.blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = issuedKeystore.filename;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                    addLog('SUCCESS', `Downloaded — ${issuedKeystore.filename}`);
                    setIssuedDownloaded(true);
                  }}
                >
                  ⬇ Download {issuedKeystore.filename}
                </button>
                <div style={{fontSize:11,color:'var(--text-dim)',fontFamily:'DM Mono,monospace'}}>
                  {issuedDownloaded
                    ? 'Saved. The keystore is also retrievable from the dashboard via Manage → Download.'
                    : 'Skip this and the keystore is gone — re-download via Manage → Download on the dashboard.'}
                </div>
              </div>
            )}
          </div>
        ) : (
          <>
            {!isLive && (
              <div className="expiry-warning" style={{marginBottom:14}}>
                <span>⚠</span>
                <span>Configure Cloud Base URL + API Key in Settings to issue real certificates.</span>
              </div>
            )}

            {/* ── Common Name ── */}
            <div className="manage-section-label" style={{marginBottom:6}}>Common Name (CN) *</div>
            <div className="manage-option-block" style={{marginBottom:10}}>
              <input
                className="deploy-input" style={{width:'100%'}}
                placeholder="hostname.jhacorp.com"
                value={commonName}
                onChange={e => setCommonName(e.target.value)}
                disabled={submitting}
              />
              <div style={{fontSize:10,color:'var(--text-dim)',marginTop:5,fontFamily:'DM Mono,monospace'}}>
                SAN auto-populated to match. CN will be added to the dashboard's DNS hostname filter on success.
              </div>
            </div>

            {/* ── Cert Type ── */}
            <div className="manage-section-label" style={{marginBottom:6}}>Issuing Template</div>
            <div className="manage-option-block" style={{marginBottom:10}}>
              <div className="ncr-algo-grid">
                {NEW_CERT_TYPES.map(t => (
                  <div key={t.value} className={`ncr-algo-btn ${certType===t.value?'selected':''}`}
                       onClick={() => !submitting && setCertType(t.value)}>
                    {t.label}
                  </div>
                ))}
              </div>

function CertRow({ cert, onManage }) {
  const daysClass = cert.status === 'Critical' ? 'days-critical' : cert.status === 'Warning' ? 'days-warning' : cert.status === 'Expired' ? 'days-expired' : 'days-healthy';
  const daysLabel = cert.daysRemaining < 0 ? `${cert.daysRemaining}d` : `+${cert.daysRemaining}d`;
  const H24 = 24 * 60 * 60 * 1000;
  const now = Date.now();
  const showRenewed    = cert.renewedAt    && (now - cert.renewedAt)    < H24;
  const showDownloaded = cert.downloadedAt && (now - cert.downloadedAt) < H24;
  const showDeployed   = cert.deployedAt   && (now - cert.deployedAt)   < H24;
  const fullyComplete  = !!(cert.renewedAt && cert.downloadedAt && cert.deployedAt);
  return (
    <tr className={`cert-row cert-row-${cert.status.toLowerCase()}`}>
      <td className="cert-td">
        <div className="cert-name">{cert.name}</div>
        {(showRenewed || showDownloaded || showDeployed) && (
          <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:5}}>
            {showRenewed    && <span className="status-chip chip-renewed">✓ Renewed</span>}
            {showDownloaded && <span className="status-chip chip-downloaded">⬇ Downloaded</span>}
            {showDeployed   && <span className="status-chip chip-deployed">⚡ Deployed</span>}
          </div>
        )}
      </td>
      <td className="cert-td">
        <div className="sans-list">
          {cert.tags.map(t => <span key={t} className="sans-tag">{t}</span>)}
        </div>
      </td>
      <td className="cert-td"><div className="expiry-date">{formatExpirationDate(cert.expirationDate)}</div></td>
      <td className="cert-td"><div className={`days-remaining ${daysClass}`}>{daysLabel}</div></td>
      <td className="cert-td"><StatusBadge status={cert.status} /></td>
      <td className="cert-td">
        <div className="action-cell">
          <button className="btn btn-secondary btn-sm" onClick={() => onManage(cert.id)}>
            ⚙ Manage
          </button>
        </div>
      </td>
    </tr>
  );
}

// <select> only emits strings — round-trip primitives (null / number / string)
// through the option list so booleans and `null` survive a save.
function selectValueToString(v) {
  if (v === null || v === undefined) return '__null__';
  return String(v);
}
function stringToSelectValue(s, options) {
  const match = options.find(o => selectValueToString(o.value) === s);
  return match ? match.value : s;
}

function ThemedSelect({ value, options, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const selected = options.find(o => o.value === value) ?? options[0];

  useEffect(() => {
    if (!open) return;
    const onDocDown = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey     = e => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onDocDown);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDocDown);
      document.removeEventListener('keydown', onKey);
    };
  }, [open]);

  return (
    <div ref={ref} className={`themed-select ${open ? 'open' : ''}`}>
      <button type="button" className="themed-select-trigger" onClick={() => setOpen(o => !o)}>
        <span>{selected?.label ?? '—'}</span>
        <svg className="themed-select-caret" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true">
          <path d="M5 7 1 3h8z"/>
        </svg>
      </button>
      {open && (
        <div className="themed-select-menu" role="listbox">
          {options.map(opt => {
            const isSelected = opt.value === value;
            return (
              <div
                key={selectValueToString(opt.value)}
                role="option"
                aria-selected={isSelected}
                className={`themed-select-option ${isSelected ? 'selected' : ''}`}
                onClick={() => { onChange(opt.value); setOpen(false); }}
              >
                <span>{opt.label}</span>
                {isSelected && <span className="themed-select-check">✓</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────────────────────
function App() {
  const [settings, setSettings] = useState({
    vaultUrl:'', vaultToken:'',
    dnsHostnames:'',
    theme: 'dark',                  // 'dark' | 'light' | 'meg'
    // { "<lowercase tag name>": "pem" | "p12" | "pfx" } — set when the user
    // adds a new tag via the New Cert modal; drives download format defaults
    // for any cert carrying that tag.
    tagFormatPreferences: {},
  });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [certs, setCerts]               = useState([]);
  const [loading, setLoading]           = useState(false);
  const [lastRefreshed, setLastRefreshed] = useState(null);
  const [tick, setTick]                 = useState(0);
  const [sortConfig, setSortConfig]     = useState({ key:'daysRemaining', dir:'asc' });
  const [modal, setModal]             = useState({ type:null, certId:null });
  const [passphrases, setPassphrases] = useState({});
  const [logEntries, setLogEntries]     = useState([]);
  const [logState, setLogState]         = useState('collapsed'); // 'collapsed' | 'normal' | 'expanded'
  const [refreshInterval, setRefreshInterval] = useState(null); // ms; null = off

  function addLog(level, message) {
    setLogEntries(prev => [...prev, { id:uuid(), timestamp:Date.now(), level, message }]);
  }

  const selectedCert = certs.find(c => c.id === modal.certId) || null;

  function openModal(certId) {
    setPassphrases(p => ({ ...p, [certId]: generatePassphrase() }));
    setModal({ type:'manage', certId });
  }

  function openNewCertModal() { setModal({ type:'new-cert', certId:null }); }

  function closeModal() { setModal({ type:null, certId:null }); }

  function addCert(newCert) {
    setCerts(prev => [newCert, ...prev]);
  }

  function updateCert(certId, patch) {
    setCerts(prev => prev.map(c => c.id === certId ? { ...c, ...patch } : c));
  }

  // Union of all tags currently present on dashboard certs — used by the
  // New Certificate modal to offer existing-tag chips alongside a +Custom input.
  const existingTags = React.useMemo(() => {
    const seen = new Map();
    certs.forEach(c => (c.tags || []).forEach(t => {
      const key = String(t).toLowerCase();
      if (key && !seen.has(key)) seen.set(key, t);
    }));
    return Array.from(seen.values()).sort((a,b) => a.localeCompare(b));
  }, [certs]);

  // Persist a user-defined tag→format preference. Stored on settings so it
  // survives like the rest of the configuration.
  function setTagPreference(tagName, format) {
    if (!tagName || !format) return;
    setSettings(prev => ({
      ...prev,
      tagFormatPreferences: {
        ...(prev.tagFormatPreferences || {}),
        [String(tagName).toLowerCase()]: format,
      },
    }));
  }

  // After a brand-new cert is issued, ensure its hostname is in the dashboard's
  // dnsHostnames filter (so the search picks it up) and trigger a refresh.
  function appendDnsHostnameAndRefresh(hostname) {
    if (!hostname) return;
    setSettings(prev => {
      const lines = (prev.dnsHostnames || '').split('\n').map(s => s.trim()).filter(Boolean);
      if (lines.some(l => l.toLowerCase() === hostname.toLowerCase())) return prev;
      const next = lines.concat(hostname).join('\n');
      addLog('INFO', `Added ${hostname} to dashboard DNS filter.`);
      return { ...prev, dnsHostnames: next };
    });
    // Note: the fetchCerts useEffect re-runs because `settings` is in its dep
    // chain (via useCallback), so the dashboard reloads automatically.
  }

  const fetchCerts = useCallback(async () => {
    setLoading(true);
    const isLive = !!(settings.vaultUrl && settings.vaultToken);
    addLog('API', isLive
      ? `POST ${settings.vaultUrl}/outagedetection/v1/certificatesearch — fetching certificate inventory…`
      : 'GET /api/v1/certificates — fetching certificate inventory (POC mock)…'
    );
    const t0 = Date.now();
    try {
      const data = isLive
        ? await realFetchCerts(settings)
        : await mockFetchCerts(settings);
      setCerts(prev => {
        const stateMap = {};
        prev.forEach(c => {
          stateMap[c.id] = {
            renewedAt:    c.renewedAt,
            downloadedAt: c.downloadedAt,
            deployedAt:   c.deployedAt,
            // If this cert was renewed, preserve the updated status/expiry so a
            // refresh can't overwrite them with stale data.
            ...(c.renewedAt ? {
              status: c.status,
              daysRemaining: c.daysRemaining,
              expirationDate: c.expirationDate,
            } : {}),
          };
        });
        return data.map(c => ({ ...c, ...(stateMap[c.id] || {}) }));
      });
      setLastRefreshed(new Date());
      addLog('API', isLive
        ? `POST /outagedetection/v1/certificatesearch → 200 OK (${Date.now()-t0}ms) — ${data.length} certificates loaded`
        : `GET /api/v1/certificates → 200 OK (${Date.now()-t0}ms) — ${data.length} certificates loaded`
      );
    } catch (err) {
      addLog('ERROR', isLive
        ? `POST /outagedetection/v1/certificatesearch → failed: ${err.message}`
        : `GET /api/v1/certificates → failed: ${err.message}`
      );
    } finally {
      setLoading(false);
    }
  }, [settings]);

  // Initial load + "last refreshed" ticker
  useEffect(() => {
    fetchCerts();
  }, [fetchCerts]);

  useEffect(() => {
    const ticker = setInterval(() => setTick(t => t+1), 15_000);
    return () => clearInterval(ticker);
  }, []);

  // Reactive auto-refresh — re-runs whenever the interval setting or fetcher changes
  useEffect(() => {
    if (!refreshInterval) return;
    const id = setInterval(fetchCerts, refreshInterval);
    return () => clearInterval(id);
  }, [refreshInterval, fetchCerts]);

  function handleSort(key) {
    setSortConfig(prev => prev.key === key ? { key, dir:prev.dir==='asc'?'desc':'asc' } : { key, dir:'asc' });
  }

  const closeSettings = () => setSettingsOpen(false);

  return (
    <div className="app-container">
      <StyleInjector />
      <Header settingsOpen={settingsOpen} onToggleSettings={() => setSettingsOpen(s => !s)} />
      {!(settings.vaultUrl && settings.vaultToken) && <POCBanner />}
      {settingsOpen && <div className="settings-backdrop" onClick={closeSettings} />}
      <SettingsPanel open={settingsOpen} settings={settings} onClose={closeSettings} onSave={next => { setSettings(next); addLog('INFO', 'Settings saved.'); }} />
      <ThemeApplier theme={settings.theme} />
      <div className="main-content">
        <CertDashboard
          certs={certs} loading={loading} lastRefreshed={lastRefreshed} tick={tick}
          sortConfig={sortConfig} onSort={handleSort} onRefresh={fetchCerts}
          refreshInterval={refreshInterval} onSetRefreshInterval={setRefreshInterval}
          onManage={openModal}
          onNewCert={openNewCertModal}
        />
      </div>
      {modal.type === 'manage' && (
        <CertManageModal
          cert={selectedCert} passphrase={passphrases[modal.certId]||''}
          settings={settings} addLog={addLog} onUpdateCert={updateCert} onClose={closeModal}
          onRequestRefresh={fetchCerts}
        />
      )}
      {modal.type === 'new-cert' && (
        <NewCertModal
          addLog={addLog}
          settings={settings}
          existingTags={existingTags}
          onCertIssued={appendDnsHostnameAndRefresh}
          onSetTagPreference={setTagPreference}
          onClose={closeModal}
        />
      )}
      <ActivityLog
        logEntries={logEntries} logState={logState} setLogState={setLogState}
        onClear={() => { setLogEntries([]); setTimeout(() => addLog('INFO','Activity log cleared.'),50); }}
      />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// MOUNT
// ─────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
